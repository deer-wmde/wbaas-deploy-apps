apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ui
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: default
    server: {{ .Values.spec.destination.server }}
  project: default
  sources:
    - path: charts/ui
      repoURL: https://github.com/wbstack/charts
      targetRevision: HEAD
      helm:
        valueFiles:
          - $deploy/charts/argocd-apps/env/production/base.values.yaml.gotmpl
          - $deploy/charts/argocd-apps/env/production/private.values.yaml.gotmpl
          - $deploy/charts/argocd-apps/env/local/base.values.yaml.gotmpl
          - $deploy/charts/argocd-apps/env/local/private.values.yaml.gotmpl
          - $deploy/charts/argocd-apps/env/production/ui.values.yaml.gotmpl
          - $deploy/charts/argocd-apps/env/local/ui.values.yaml.gotmpl
        # parameters:
        #   - name: ui.recaptchaSitekeySecretName
        #     value: "{{ .Values.external.recaptcha3.secretName }}"
    - repoURL: https://github.com/deer-wmde/wbaas-deploy-apps
      ref: deploy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true