apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ui
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: default
    server: {{ .Values.spec.destination.server }}
  project: default
  sources:
    - path: charts/ui
      repoURL: https://github.com/wbstack/charts
      targetRevision: HEAD
      helm:
        valuesObject: |
{{ tpl (.Files.Get "env/production/base.yaml") . | indent 8 }}
{{ tpl (.Files.Get "env/production/private.yaml") . | indent 8 }}
{{ tpl (.Files.Get "env/local/base.yaml") . | indent 8 }}
{{ tpl (.Files.Get "env/local/private.yaml") . | indent 8 }}
{{ tpl (.Files.Get "env/production/ui.values.yaml.gotmpl") . | indent 8 }}
{{ tpl (.Files.Get "env/local/ui.values.yaml.gotmpl") . | indent 8 }}
    - repoURL: https://github.com/deer-wmde/wbaas-deploy-apps
      ref: deploy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true